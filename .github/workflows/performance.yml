name: performance

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Performance profile
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - load
          - stress

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run perf:${{ github.event.inputs.profile }}
